name: Generate Weekly Transits

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install numpy astroquery pyswisseph python-dateutil requests

      - name: Set Python path
        run: |
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Run weekly transit generator
        run: |
          python -m scripts.generate_transits || echo "Generator failed, continuing to validation fallback"

      - name: Validate or rebuild weekly JSON
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timedelta
          from pathlib import Path

          out = Path("docs/current_week.json")
          now = datetime.utcnow().date()
          days_since_sunday = (now.weekday() + 1) % 7
          week_start = now - timedelta(days=days_since_sunday)
          week_end = week_start + timedelta(days=6)

          def minimal_payload():
              return {
                  "generated_utc": datetime.utcnow().isoformat(),
                  "week_start": week_start.strftime("%Y-%m-%d"),
                  "week_end": week_end.strftime("%Y-%m-%d"),
                  "engine_version": "ZodiacOracle.LiveTransit.vHybrid",
                  "coverage": 0.0,
                  "resolved": 0,
                  "total_targets": 0,
                  "missing": [],
                  "bodies": {},
                  "arabic_parts": {},
                  "fixed_star_conjunctions": {},
                  "generation_warning": "fallback payload generated by workflow",
              }

          valid = False
          if out.exists():
              try:
                  data = json.loads(out.read_text())
                  required = {
                      "generated_utc", "week_start", "week_end", "engine_version",
                      "coverage", "resolved", "total_targets", "missing",
                      "bodies", "arabic_parts", "fixed_star_conjunctions"
                  }
                  valid = isinstance(data, dict) and required.issubset(data)
              except Exception:
                  valid = False

          if not valid:
              out.parent.mkdir(parents=True, exist_ok=True)
              out.write_text(json.dumps(minimal_payload(), indent=2))
              print("Wrote fallback docs/current_week.json")
          else:
              print("docs/current_week.json is valid")
          PY

      - name: Verify output
        run: |
          if [ ! -f docs/current_week.json ]; then
            echo "ERROR: docs/current_week.json missing"
            exit 1
          fi
          python -m json.tool docs/current_week.json > /dev/null

      - name: Commit updated weekly overlay
        run: |
          git config user.name "transit-bot"
          git config user.email "bot@github.com"

          git add docs/current_week.json

          git diff --cached --quiet || git commit -m "update weekly transits"

          git push
