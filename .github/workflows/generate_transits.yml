name: Generate Weekly Transits

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install numpy astroquery pyswisseph python-dateutil requests

      - name: Set Python path
        run: |
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Run weekly transit generator
        run: |
          python -m scripts.generate_transits

      - name: Verify output
        run: |
          if [ ! -f docs/current_week.json ]; then
            echo "ERROR: docs/current_week.json missing"
            exit 1
          fi

      - name: Commit updated weekly overlay
        run: |
          git config user.name "transit-bot"
          git config user.email "bot@github.com"

          git add docs/current_week.json

          git diff --cached --quiet || git commit -m "update weekly transits"

          git push
