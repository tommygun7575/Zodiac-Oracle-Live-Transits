name: generate

on:
  schedule:
    - cron: "0 14 * * 0"
  workflow_dispatch:

jobs:
  generate:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pyswisseph requests

      - name: Run transit generator
        run: |
          python scripts/generate_transits.py

      - name: Commit updated transit file
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add docs/current_week.json
          git commit -m "Update weekly transit file" || echo "no changes"
          git push
