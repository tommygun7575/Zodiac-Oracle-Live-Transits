name: Generate Weekly Transits

on:
  schedule:
    # 04:00 UTC every Sunday
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyswisseph
          pip install astroquery
          pip install python-dateutil
          pip install pytz
          pip install requests
          pip install numpy

      - name: Run transit generator
        run: python scripts/generate_transits.py

      - name: Commit updated transit file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/current_week.json
          git commit -m "Update weekly transit file" || echo "No changes"
          git push
