name: Generate Weekly Transits

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests numpy skyfield

      - name: Run transit generator
        run: |
          python scripts/generate_transits.py

      - name: Commit updated transit file
        run: |
          git config --global user.name "oracle-bot"
          git config --global user.email "oracle-bot@github"

          git add docs/current_week.json docs/_meta.json

          git commit -m "Weekly transit update" || echo "No changes"

          git push
