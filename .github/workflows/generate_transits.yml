name: Generate Weekly Transits

on:
  schedule:
    - cron: "0 4 * * 0"   # Sunday 04:00 UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyswisseph
          pip install python-dateutil
          pip install pytz
          pip install requests

      - name: Run transit generator
        run: python scripts/generate_transits.py

      - name: Commit updated transit file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/
          git commit -m "Update weekly transits" || echo "No changes"
          git push
