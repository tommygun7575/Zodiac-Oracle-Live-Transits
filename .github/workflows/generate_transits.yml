name: Generate Weekly Transits

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          pip install astroquery
          pip install swisseph
          pip install python-dateutil
          pip install requests

      - name: Run generator
        run: |
          python scripts/generate_transits.py

      - name: Commit updated transit feeds
        run: |
          git config --global user.name "transit-bot"
          git config --global user.email "bot@github.com"

          git add docs/weekly_overlay.json

          git commit -m "update weekly transits" || echo "no changes"

          git push
