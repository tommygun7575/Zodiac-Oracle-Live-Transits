name: Generate Transit Feeds

on:
  workflow_dispatch:

  schedule:
    - cron: "0 4 * * 0"   # Every Sunday at 04:00 UTC

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install swisseph astroquery requests python-dateutil

      - name: Add scripts folder to PYTHONPATH
        run: |
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Run transit generator
        run: |
          python3 scripts/generate_transits.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Create weekly archive copy
        run: |
          DATE=$(date -u +'%Y-%m-%d')

          if [ -f docs/current_week.json ]; then
            cp docs/current_week.json docs/current_week_$DATE.json
          else
            echo "current_week.json not found – skipping archive"
          fi

      - name: Keep only the last 4 weekly files
        run: |
          cd docs
          ls current_week_*.json 2>/dev/null | sort -r | tail -n +5 | xargs -r rm
          cd ..

      - name: Commit updated feeds
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add docs/*.json
          git add changelog || true

          git commit -m "Update weekly transit feed (auto-generated)" || echo "No changes to commit"
          git push
